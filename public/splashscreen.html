<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Recepcion OAC</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                width: 100vw;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%);
                overflow: hidden;
                font-family:
                    'Segoe UI',
                    system-ui,
                    -apple-system,
                    sans-serif;
                -webkit-user-select: none;
                user-select: none;
            }

            .splash-container {
                width: 100%;
                height: 100%;
                background: none;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                position: relative;
                overflow: hidden;
            }

            .splash-container::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 4px;
                background: linear-gradient(90deg, #4ecdc4, #f7b733, #4ecdc4);
                background-size: 200% 100%;
                animation: shimmer 2s ease-in-out infinite;
            }

            @keyframes shimmer {
                0% {
                    background-position: -200% 0;
                }
                100% {
                    background-position: 200% 0;
                }
            }

            .logo {
                width: 90px;
                height: 90px;
                animation: fadeInUp 0.6s ease-out;
            }

            .logo img {
                width: 100%;
                height: 100%;
                object-fit: contain;
            }

            .app-name {
                font-size: 22px;
                font-weight: 700;
                color: #1a1a2e;
                letter-spacing: 0.5px;
                animation: fadeInUp 0.6s ease-out 0.15s both;
            }

            .app-subtitle {
                font-size: 12px;
                color: #6b7280;
                letter-spacing: 1px;
                text-transform: uppercase;
                margin-top: -12px;
                animation: fadeInUp 0.6s ease-out 0.3s both;
            }

            .loading-bar-container {
                width: 200px;
                height: 4px;
                background: #e5e7eb;
                border-radius: 2px;
                overflow: hidden;
                animation: fadeInUp 0.6s ease-out 0.45s both;
            }

            .loading-bar {
                width: 30%;
                height: 100%;
                background: linear-gradient(90deg, #4ecdc4, #f7b733);
                border-radius: 2px;
                animation: loading 1.8s ease-in-out infinite;
            }

            @keyframes loading {
                0% {
                    width: 0%;
                    margin-left: 0;
                }
                50% {
                    width: 60%;
                    margin-left: 20%;
                }
                100% {
                    width: 0%;
                    margin-left: 100%;
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(15px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .version {
                position: absolute;
                bottom: 14px;
                right: 20px;
                font-size: 10px;
                color: #9ca3af;
                animation: fadeInUp 0.6s ease-out 0.6s both;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    background: linear-gradient(145deg, #1e1e2e 0%, #181825 100%);
                }
                .app-name {
                    color: #e4e4e7;
                }
                .app-subtitle {
                    color: #9ca3af;
                }
                .loading-bar-container {
                    background: #374151;
                }
                .version {
                    color: #6b7280;
                }
            }
        </style>
    </head>
    <body>
        <div class="splash-container">
            <div class="logo">
                <img src="/icons/icon.png" alt="Logo" />
            </div>
            <div class="app-name">Recepción OAC</div>
            <div class="app-subtitle">Sistema de Gestión Documental</div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
            <div class="version">v0.1.0</div>
        </div>
        <script>
            // Mostrar la ventana splash solo cuando el contenido esté renderizado.
            // withGlobalTauri está habilitado → __TAURI__ disponible globalmente.
            window.addEventListener('DOMContentLoaded', () => {
                requestAnimationFrame(() => {
                    if (window.__TAURI__) {
                        window.__TAURI__.webviewWindow.getCurrentWebviewWindow().show();
                    }
                });
            });
        </script>
    </body>
</html>
